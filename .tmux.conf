# Alt+s to run the script and pipe to the Windows clipboard
bind-key -n M-s run-shell "$HOME/dotfiles/scripts/latest_windows_screenshot.sh | clip.exe && tmux display-message 'Path copied!'"

bind v display-popup -E -w 90% -h 90% "tmux capture-pane -p -S - | nvim -c 'set buftype=nofile' -c 'nnoremap q :q!<CR>' -c '$' -"

set -g copy-mode-match-style 'fg=black,bg=yellow'
set -g copy-mode-current-match-style 'fg=white,bg=red'

# Active by L (capital L)
# 1. Enter Copy Mode & Move Up
# 2. Search for Arrow "➜ "
# 3. Move Right to the start of the command
# 4. START SELECTION (begin-selection)
# 5. Jump to the end of the line (end-of-line) to highlight the whole command
bind-key L copy-mode \; send-keys -X cursor-up \; send-keys -X search-backward "➜ " \; send-keys -X cursor-right \; send-keys -X cursor-right \; send-keys -X begin-selection \; send-keys -X end-of-line

# rebind kill-pane without confirmation
bind x run-shell "$HOME/dotfiles/scripts/tmux-kill-pane-and-sort.sh"

bind-key n command-prompt -I "rename-session "

set -g @sessionist-promote-pane "C-S-F11"
set -g @sessionist-promote-window "C-S-F12"
set -g @sessionist-alternate "C-s"

# tmux-fzf-session-switch
# Search session only
set-option -g @fzf-goto-session-only 'true'
# override the default session switcher in tmux available at prefix + s`:
# set -g @fzf-goto-session 's'

set -g @fzf-goto-win-width 80
set -g @fzf-goto-win-height 20

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",wezterm:RGB"
set -g focus-events on
set -g escape-time 10

# start window from 1
set -g base-index 1
setw -g pane-base-index 1

unbind-key C-b
set -g prefix C-space
bind-key C-space send-prefix

# ctrl + a: jump last window
bind-key C-a last-window

# ctrl + shift + left|right: swap to left or right
# Custom keys sent by WezTerm
set -s user-keys[0] "\e[5;30012~"
set -s user-keys[1] "\e[5;30013~"
bind-key -T root User0 swap-window -t -1 \; previous-window
bind-key -T root User1 swap-window -t +1 \; next-window

# create new window from last path
bind c new-window -c "#{pane_current_path}"

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind '-' split-window -c "#{pane_current_path}"

unbind r
bind R source-file ~/.tmux.conf

bind r run-shell "$HOME/dotfiles/scripts/reorder-tmux.sh"

set -g mouse on

# resize pane
bind -r m resize-pane -Z

# [prefix] Alt ← or [prefix] Ctrl ↓
bind-key -r -T prefix       M-Up              resize-pane -U 5
bind-key -r -T prefix       M-Down            resize-pane -D 5
bind-key -r -T prefix       M-Left            resize-pane -L 5
bind-key -r -T prefix       M-Right           resize-pane -R 5
bind-key -r -T prefix       C-Up              resize-pane -U
bind-key -r -T prefix       C-Down            resize-pane -D
bind-key -r -T prefix       C-Left            resize-pane -L
bind-key -r -T prefix       C-Right           resize-pane -R

# change default shell
set-option -g default-shell /usr/bin/zsh

# pane navigation
bind -r h select-pane -L  # move left
bind -r j select-pane -D  # move down
bind -r k select-pane -U  # move up
bind -r l select-pane -R  # move right

# VI copy mode
setw -g mode-keys vi

# begin selection (highlight) by pressing v while in copy mode (copy-mode-vi)
bind -T copy-mode-vi v send -X begin-selection
# yank the text with y in copy mode (copy-mode-vi)
bind -T copy-mode-vi y send-keys -X copy-pipe "xsel --clipboard --input"
# paste from the tmux buffer (where our text is saved) <Prefix> p
bind p paste-buffer
# choose which buffer to paste from - <Prefix> P
bind P choose-buffer

########################
# config dracula theme #
########################
set -g @catppuccin_flavour 'mocha' # latte,frappe, macchiato or mocha
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"

# status to top
set-option -g status-position top

###################
# List of plugins #
###################
set -g @plugin 'catppuccin/tmux#latest'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'dracula/tmux'
# set -g @dracula-show-left-icon session
# Prefix + Ctrl + f: Open up fzf in a new tab. 
# (e.g. prefix = ctrl + b. Hold ctrl -> press a -> press f -> done)
set -g @plugin 'thuanOwa/tmux-fzf-session-switch'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# prefix-highlight configurations
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=black,bg=yellow,bold'
set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_sync_mode_attr 'fg=black,bg=green'
set -g @prefix_highlight_fg 'black'
set -g @prefix_highlight_bg 'yellow'
set -g @prefix_highlight_output_prefix '❮ '
set -g @prefix_highlight_output_suffix ' ❯'

# --- HIGH VISIBILITY OVERRIDES ---
# 1. Selection Color: Bright Yellow background, Black text (Impossible to miss)
set -g mode-style "fg=#000000,bg=#FFFF00"

# 2. Search Match Color: When it finds the "➜", make it Bright Red
set -g copy-mode-match-style "fg=#FFFFFF,bg=#FF0000"

# 3. Current Match: The specific "➜" you jumped to is Bright Magenta
set -g copy-mode-current-match-style "fg=#FFFFFF,bg=#FF00FF"

# Configure status-left and status-right with prefix highlight
set -g status-left "#[fg=#bd93f9]#S #[fg=#6272a4]|"
set -g status-right "#{prefix_highlight} | %a %Y-%m-%d %H:%M"

# Dracula-style tmux status and border overrides.
set -g status-style "bg=#191a21,fg=#f8f8f2"
set -g status-left-style "bg=#191a21,fg=#bd93f9"
set -g status-right-style "bg=#191a21,fg=#f8f8f2"

setw -g window-status-style "bg=#191a21,fg=#6272a4"
setw -g window-status-current-style "bg=#bd93f9,fg=#282a36,bold"

set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=#bd93f9"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# Press prefix + I (capital i, as in Install) to fetch the plugin.
run '~/.tmux/plugins/tpm/tpm'
